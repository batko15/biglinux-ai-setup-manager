# BigLinux RTX 4070 AI Stack - Docker Compose
# Optimized for: Intel i5-12400F + RTX 4070 12GB + 32GB RAM

version: '3.8'

services:
  # Ollama - Local LLM Inference
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI - Chat Interface
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=your-secret-key-here
    depends_on:
      - ollama

  # Qdrant - Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ChromaDB - Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # LocalAI - OpenAI-compatible API
  localai:
    image: localai/localai:latest-gpu-cuda-12
    container_name: localai
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - localai_models:/models
      - ./configs/localai:/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - MODELS_PATH=/models
      - THREADS=12
      - CONTEXT_SIZE=8192
      - GPU=true

  # Whisper - Speech-to-Text
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - ASR_MODEL=large-v3
      - ASR_ENGINE=faster_whisper

  # Stable Diffusion WebUI
  stable-diffusion:
    image: siutin/stable-diffusion-webui-docker:latest-cuda
    container_name: stable-diffusion
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - sd_models:/app/models
      - sd_outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CLI_ARGS=--xformers --listen --enable-insecure-extension-access

  # LangFlow - Visual AI Builder
  langflow:
    image: langflowai/langflow:latest
    container_name: langflow
    restart: unless-stopped
    ports:
      - "7861:7860"
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:////app/data/langflow.db
    volumes:
      - langflow_data:/app/data

  # Flowise - Visual AI Builder
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - flowise_data:/root/.flowise
    environment:
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise

  # Text Generation WebUI (oobabooga)
  text-gen-webui:
    image: atinoda/text-generation-webui:latest-cuda
    container_name: text-gen-webui
    restart: unless-stopped
    ports:
      - "7862:7860"
    volumes:
      - textgen_models:/app/models
      - textgen_extensions:/app/extensions
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - GPU=true
      - LISTEN=true
      - API=true

  # Jupyter Lab for AI Development
  jupyter:
    image: jupyter/tensorflow-notebook:latest
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - jupyter_data:/home/jovyan/work
      - ./notebooks:/home/jovyan/work/notebooks
    environment:
      - JUPYTER_TOKEN=your-token-here

  # Redis for caching
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_data:/var/log/nginx
    depends_on:
      - open-webui
      - ollama

volumes:
  ollama_data:
  open_webui_data:
  qdrant_data:
  chroma_data:
  localai_models:
  sd_models:
  sd_outputs:
  langflow_data:
  flowise_data:
  textgen_models:
  textgen_extensions:
  jupyter_data:
  redis_data:
  nginx_data:

networks:
  default:
    name: ai-network
